pre-commit:
  parallel: false
  commands:
    prettier:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,css,scss,md,mdx,yml,yaml}"
      run: node scripts/npm-run.js run format:staged -- {staged_files}
      stage_fixed: true
    verify-no-explicit-any:
      run: node scripts/npm-run.js run verify:no-explicit-any
    verify-dedupe:
      run: node scripts/npm-run.js run verify:dedupe
    verify-ts-docstrings:
      run: node scripts/npm-run.js run verify:ts-docstrings
    verify-python-docstrings:
      run: node scripts/npm-run.js run verify:python-docstrings:changed

pre-push:
  parallel: false
  commands:
    verify-no-explicit-any:
      run: node scripts/npm-run.js run verify:no-explicit-any
    verify-dedupe:
      run: node scripts/npm-run.js run verify:dedupe
    verify-ts-docstrings:
      run: node scripts/npm-run.js run verify:ts-docstrings
    verify-python-docstrings:
      run: node scripts/npm-run.js run verify:python-docstrings:changed
    typecheck:
      run: node scripts/npm-run.js run typecheck
