name: 🔍 Preview Checks

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '18'

jobs:
  build-preview:
    name: 🔨 Preview Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📡 Fetch verify base ref
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch --no-tags --depth=1 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔎 Verify changed TypeScript files
        run: node scripts/npm-run.js run verify:no-explicit-any
        env:
          EXPLICIT_ANY_BASE: origin/${{ github.event.pull_request.base.ref || 'main' }}

      - name: 🔍 Type check
        run: npm run typecheck

      - name: 🔨 Build for preview
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    needs: build-preview
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔒 Run security audit
        run: npm audit --audit-level=moderate

      - name: 📊 Check bundle size
        run: |
          npm run build
          echo "## 📊 Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Build completed successfully. Check the build output for bundle size information." >> $GITHUB_STEP_SUMMARY
