name: PR Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:
  verify:
    name: Verify changed TypeScript
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch verify base ref
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch --no-tags --depth=1 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject explicit any in changed TypeScript
        run: node scripts/npm-run.js run verify:no-explicit-any
        env:
          EXPLICIT_ANY_BASE: origin/${{ github.event.pull_request.base.ref || 'main' }}

      - name: Reject duplicate-prone changed code
        run: node scripts/npm-run.js run verify:dedupe
        env:
          DEDUPE_BASE: origin/${{ github.event.pull_request.base.ref || 'main' }}

      - name: Type check
        run: node scripts/npm-run.js run typecheck
