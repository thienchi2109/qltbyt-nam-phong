name: 🔒 Security Audit Baseline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1-5'

env:
  NODE_VERSION: '18'

jobs:
  audit-baseline:
    name: 🔒 Full npm audit baseline
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔒 Run full security audit
        run: npm audit --audit-level=moderate

      - name: 📝 Audit tracking note
        if: always()
        run: |
          echo "## 🔒 Security Audit Baseline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Track remediation work in issue #194." >> $GITHUB_STEP_SUMMARY
